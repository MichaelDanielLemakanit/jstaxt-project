<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Login - Nairobi Delivery App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1 0 auto;
        }

        .login-card {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-medium" href="#">MJ-payslip check</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <!-- ms-auto cleanly pushes the menu navigation elements to the right -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">


                <div class="card shadow-sm login-card p-4 bg-body-secondary">
                    <div class="card-body">

                        <div class="text-center mb-4">
                            <div class="text-success mb-2">
                                <i class="bi bi-key display-4"></i>
                            </div>
                            <h2 class="fw-bold h3 mb-1">Usser Login</h2>
                            <p class="text-muted small">Check your taxible income today with MJ
                            </p>
                        </div>

                        <form>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i
                                            class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email"
                                        placeholder="e.g., michael@gmail.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password"
                                        placeholder="Enter your password" required>
                                </div>
                            </div>

                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-success py-2.5 fw-bold shadow-sm">
                                    <a href="home.html"> <i class="bi bi-box-arrow-in-right me-2"></i> Sign In 
                                        Work</a>
                                </button>
                            </div>

                        </form>

                        <div class="text-center mt-3">
                            <span class="text-danger small">click sigin to continue <br>
                                Not a must to sign in or create an account </span><br>
                            <a href="home.html"
                                class="link-success small fw-bold text-decoration-none">Create an Account Here</a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>


    <footer class="bg-success text-white text-center py-3 mt-auto">
        <div class="container text-muted small">
            &copy; 2026 MJ-payslip checker. Logistics Authentication Node.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
